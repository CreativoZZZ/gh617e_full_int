        show_state: false
        show_icon: true
        icon: mdi:checkbox-marked-circle
        tap_action: { action: toggle }
        view_layout: { grid-column: 4, grid-row: 1 }
        styles: *sel_style
      - type: custom:button-card
        entity: input_boolean.govee_h617e_seg_5_selected
        show_name: false
        show_state: false
        show_icon: true
        icon: mdi:checkbox-marked-circle
        tap_action: { action: toggle }
        view_layout: { grid-column: 5, grid-row: 1 }
        styles: *sel_style

      - type: custom:button-card
        entity: light.govee_h617e_segment_1
        name: "1"
        show_state: false
        show_icon: false
        tap_action: { action: more-info }
        hold_action: { action: toggle }
        view_layout: { grid-column: 1, grid-row: 2 }
        styles: &seg_style
          card:
            - height: 38px
            - border-radius: 10px
            - border: 1px solid #d8dde5
            - background: >
                [[[
                  const rgb = entity?.attributes?.rgb_color;
                  if (entity?.state === 'on' && rgb) return `rgb(${rgb[0]},${rgb[1]},${rgb[2]})`;
                  return '#f0f2f6';
                ]]]
          name:
            - font-size: 20px
            - font-weight: 600
            - color: >
                [[[
                  return entity?.state === 'on' ? '#ffffff' : '#b8c0cc';
                ]]]
      - type: custom:button-card
        entity: light.govee_h617e_segment_2
        name: "2"
        show_state: false
        show_icon: false
