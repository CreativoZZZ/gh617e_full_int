      - type: custom:button-card
        name: Single-Auswahl
        icon: mdi:cursor-default-click
        tap_action:
          action: javascript
          javascript: |
            [[[ 
              const card = this.shadowRoot?.querySelector('ha-card');
              if (card) {
                card.classList.remove('selection-flash');
                void card.offsetWidth;
                card.classList.add('selection-flash');
                setTimeout(() => card.classList.remove('selection-flash'), 320);
              }
              const allSelectionEntities = ['input_boolean.govee_h617e_seg_1_selected', 'input_boolean.govee_h617e_seg_2_selected', 'input_boolean.govee_h617e_seg_3_selected', 'input_boolean.govee_h617e_seg_4_selected', 'input_boolean.govee_h617e_seg_5_selected', 'input_boolean.govee_h617e_seg_6_selected', 'input_boolean.govee_h617e_seg_7_selected', 'input_boolean.govee_h617e_seg_8_selected', 'input_boolean.govee_h617e_seg_9_selected', 'input_boolean.govee_h617e_seg_10_selected', 'input_boolean.govee_h617e_seg_11_selected', 'input_boolean.govee_h617e_seg_12_selected', 'input_boolean.govee_h617e_seg_13_selected', 'input_boolean.govee_h617e_seg_14_selected', 'input_boolean.govee_h617e_seg_15_selected'];
              const selectedEntities = allSelectionEntities.filter((entityId) => hass.states[entityId]?.state === 'on');
              hass.callService('input_boolean', 'turn_off', { entity_id: 'input_boolean.govee_h617e_multi_select_mode' });
              if (selectedEntities.length > 1) {
                const keepEntity = selectedEntities[selectedEntities.length - 1];
                const otherEntities = allSelectionEntities.filter((entityId) => entityId !== keepEntity);
                hass.callService('input_boolean', 'turn_off', { entity_id: otherEntities });
                hass.callService('input_boolean', 'turn_on', { entity_id: keepEntity });
              }
            ]]]
        styles:
          card:
            - border-radius: 10px
            - border: >
                [[[
                  const multiMode = hass.states['input_boolean.govee_h617e_multi_select_mode']?.state === 'on';
                  return multiMode ? '1px solid #d8dde5' : '2px solid #00b8ff';
                ]]]
            - background: >
                [[[
                  const multiMode = hass.states['input_boolean.govee_h617e_multi_select_mode']?.state === 'on';
                  return multiMode ? '#ffffff' : 'rgba(0, 184, 255, 0.14)';
                ]]]
            - height: 42px
