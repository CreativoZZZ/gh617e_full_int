type: vertical-stack
cards:
  - type: light
    entity: light.govee_h617e
    name: Relative Helligkeit (global)

  - type: custom:layout-card
    layout_type: custom:grid-layout
    layout:
      grid-template-columns: repeat(5, minmax(0, 1fr))
      grid-template-rows: repeat(6, auto)
      column-gap: 8px
      row-gap: 8px
    cards:
      - type: custom:button-card
        entity: input_boolean.govee_h617e_seg_1_selected
        show_name: false
        show_state: false
        show_icon: true
        icon: mdi:checkbox-marked-circle
        tap_action: { action: toggle }
        view_layout: { grid-column: 1, grid-row: 1 }
        styles: &sel_style
          card:
            - background: transparent
            - box-shadow: none
            - border: none
            - height: 30px
          icon:
            - color: >
                [[[
                  return entity?.state === 'on' ? '#00b8ff' : '#7f8b9b';
                ]]]
            - width: 22px
      - type: custom:button-card
        entity: input_boolean.govee_h617e_seg_2_selected
        show_name: false
        show_state: false
        show_icon: true
        icon: mdi:checkbox-marked-circle
        tap_action: { action: toggle }
        view_layout: { grid-column: 2, grid-row: 1 }
        styles: *sel_style
      - type: custom:button-card
        entity: input_boolean.govee_h617e_seg_3_selected
        show_name: false
        show_state: false
        show_icon: true
        icon: mdi:checkbox-marked-circle
        tap_action: { action: toggle }
        view_layout: { grid-column: 3, grid-row: 1 }
        styles: *sel_style
      - type: custom:button-card
